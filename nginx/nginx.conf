server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # convenience: bare host -> new app
    location = / { return 302 /latest/; }

    # new Svelte app (built with base=/latest/)
    location = /latest { return 302 /latest/; }
    location /latest/ {
        try_files $uri $uri/ /latest/index.html;
    }

    # old single page (only tcp_simulator.html kept)
    location = /old { return 302 /old/; }
    location /old/ {
        try_files $uri $uri/ /old/index.html;
    }

    # REST API -> backend.
    # Resolve the container name at request time via Docker's embedded DNS so
    # nginx starts even if the backend isn't up yet (avoids "host not found in
    # upstream" at boot). The rewrite strips the /api prefix.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api backend:5000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
