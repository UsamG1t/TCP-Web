version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcp-simulator-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/tcp-simulator:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tcp-simulator-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tcp-simulator-backend
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - tcp-simulator-network

networks:
  tcp-simulator-network:
    driver: bridge

volumes:
  nginx-logs:
