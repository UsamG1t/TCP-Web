version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: tcp-simulator-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/tcp-simulator:ro
      - nginx-logs:/var/log/nginx
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tcp-simulator-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tcp-simulator-backend
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - tcp-simulator-network

  # Uncomment for SSL with Let's Encrypt
  # certbot:
  #   image: certbot/certbot
  #   container_name: tcp-simulator-certbot
  #   volumes:
  #     - certbot-data:/etc/letsencrypt
  #     - certbot-www:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  tcp-simulator-network:
    driver: bridge

volumes:
  nginx-logs:
  certbot-data:
  certbot-www:
