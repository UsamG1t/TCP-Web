services:
  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: tcp-simulator-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tcp-simulator-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tcp-simulator-backend
    ports:
      - "5000:5000"          # REST API exposed directly on the port
    restart: unless-stopped
    networks:
      - tcp-simulator-network

networks:
  tcp-simulator-network:
    driver: bridge
