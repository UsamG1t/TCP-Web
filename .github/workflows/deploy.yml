name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NGINX_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            
            PROJECT_DIR="/opt/tcp-simulator"
            COMPOSE_FILE="$PROJECT_DIR/docker-compose.yml"
            
            echo "=== Creating project directory ==="
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            echo "=== Pulling latest docker-compose.yml ==="
            # You can either SCP the compose file or clone the repo
            # Option 1: Clone repo
            if [ -d "$PROJECT_DIR/.git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            echo "=== Updating image tags in compose file ==="
            sed -i "s|build:.*|image: ${{ env.BACKEND_IMAGE }}:latest|g" $COMPOSE_FILE || true
            sed -i "s|context: ./backend|# image: ${{ env.BACKEND_IMAGE }}:latest|g" $COMPOSE_FILE || true
            sed -i "s|dockerfile: Dockerfile|# pulled from registry|g" $COMPOSE_FILE || true
            
            echo "=== Logging into GitHub Container Registry ==="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            echo "=== Pulling latest images ==="
            docker compose -f $COMPOSE_FILE pull
            
            echo "=== Restarting services ==="
            docker compose -f $COMPOSE_FILE down
            docker compose -f $COMPOSE_FILE up -d
            
            echo "=== Cleaning up old images ==="
            docker image prune -af --filter "until=168h"
            
            echo "=== Deployment complete ==="
            docker compose -f $COMPOSE_FILE ps
